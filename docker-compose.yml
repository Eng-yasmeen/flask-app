version: "3.8"

services:
  flask-app:
    image: yasmeen142/flask-app:latest
    container_name: flask-app
    restart: always
    expose:
      - "5000"
    networks:
      - app-net

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
